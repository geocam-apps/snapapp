<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>snapapp — project</title>
<link rel="stylesheet" href="/static/app.css?v={{ v }}">
</head>
<body>

<header>
  <a href="/" class="back">&larr; projects</a>
  <h1 id="projTitle">Project</h1>
  <div class="tag" id="projTag"></div>
</header>

<main>
  <section class="shots">
    <div class="row">
      <h2>Shots</h2>
      <div class="actions">
        <span id="selCount" class="meta" style="margin-right:8px"></span>
        <button id="runSelectedBtn" class="small" disabled>Run selected</button>
        <button id="runAllBtn" class="small secondary">Run all pending</button>
        <button id="searchCellsBtn" class="small secondary">Find GeoCam cells</button>
        <a id="combinedSceneBtn" class="small" style="display:none"
           href="#"><button class="small">Combined 3D scene</button></a>
      </div>
    </div>
    <div class="legend">
      MegaLoc:
      <span class="score-pill score-high">≥ 0.50</span>
      <span class="score-pill score-ok">≥ 0.30</span>
      <span class="score-pill score-weak">≥ 0.15</span>
      <span class="score-pill score-bad">&lt; 0.15</span>
      &nbsp; GPS:
      <span class="score-pill score-high" style="background:#059669">in radius</span>
      <span class="score-pill score-bad" style="background:#991b1b">far</span>
      <span class="legend-note">— each shot is a 7-photo bundle (wide + mid + 5 burst); SFM bundles them with constrained per-zoom intrinsics.</span>
    </div>
    <div id="shotTiles" class="shot-grid"></div>
  </section>

  <section class="sqlite" id="sqliteSection" style="display:none">
    <h2>SQLite contents</h2>
    <div id="sqliteInfo"></div>
  </section>

  <section class="danger">
    <button id="deleteProjectBtn" class="danger">Delete project</button>
  </section>

  <div id="cellsModal" class="modal" style="display:none">
    <div class="modal-inner">
      <div class="modal-hdr">
        <h3>GeoCam cells containing your shots</h3>
        <button id="cellsCloseBtn" class="small secondary">Close</button>
      </div>
      <div id="cellsBody" class="modal-body">Searching…</div>
    </div>
  </div>
</main>

<script>window.PROJECT_ID = location.pathname.split("/")[2];</script>
<script src="/static/project.js?v={{ v }}"></script>
</body>
</html>
