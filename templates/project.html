<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>snapapp — project</title>
<link rel="stylesheet" href="/static/app.css?v={{ v }}">
</head>
<body>

<header>
  <a href="/" class="back">&larr; projects</a>
  <h1 id="projTitle">Project</h1>
  <div class="tag" id="projTag"></div>
</header>

<main>
  <section class="shots">
    <div class="row">
      <h2>Shots</h2>
      <button id="newShotBtn" class="small">+ New shot from selection</button>
    </div>
    <div id="shotsList"></div>
  </section>

  <section class="photos">
    <h2>Uploaded photos</h2>
    <div class="sel-hint">Tap a photo to select it, then use "New shot" to run a sub-sequence.</div>
    <div class="legend">
      MegaLoc score:
      <span class="score-pill score-high">≥ 0.50 high</span>
      <span class="score-pill score-ok">≥ 0.30 good</span>
      <span class="score-pill score-weak">≥ 0.15 weak</span>
      <span class="score-pill score-bad">&lt; 0.15 noise</span>
      <span class="legend-note">— scores below 0.15 mean the ref FAISS index doesn't cover this location; SFM will fail.</span>
    </div>
    <div id="photosGrid" class="thumb-grid"></div>
  </section>

  <section class="sqlite" id="sqliteSection" style="display:none">
    <h2>SQLite contents</h2>
    <div id="sqliteInfo"></div>
  </section>

  <section class="danger">
    <button id="deleteProjectBtn" class="danger">Delete project</button>
  </section>
</main>

<script>window.PROJECT_ID = location.pathname.split("/")[2];</script>
<script src="/static/project.js?v={{ v }}"></script>
</body>
</html>
